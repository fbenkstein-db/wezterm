name: macos

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    if: github.repository == 'fbenkstein-db/wezterm'
    runs-on: "macos-latest"

    env:
      CARGO_INCREMENTAL: "0"
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      MACOSX_DEPLOYMENT_TARGET: "10.12"

    steps:
      - name: "checkout repo"
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
      - name: "Install Rust (ARM)"
        shell: bash
        run: "rustup target add aarch64-apple-darwin"
      - name: "Compile with sccache"
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: "Cache Rust Dependencies"
        uses: actions/cache@v4
        id: cache-cargo-vendor
        with:
          path: |
            vendor
            .cargo/config
          key: "cargo-deps-${{ hashFiles('**/Cargo.lock') }}"
      - name: "Vendor dependencies"
        if: steps.cache-cargo-vendor.outputs.cache-hit != 'true'
        shell: bash
        run: "cargo vendor --locked --versioned-dirs >> .cargo/config"
      - name: "Build wezterm (ARM)"
        shell: bash
        run: "cargo build --target aarch64-apple-darwin -p wezterm --release"
      - name: "Build wezterm-gui (ARM)"
        shell: bash
        run: "cargo build --target aarch64-apple-darwin -p wezterm-gui --release"
      - name: "Build wezterm-mux-server (ARM)"
        shell: bash
        run: "cargo build --target aarch64-apple-darwin -p wezterm-mux-server --release"
      - name: "Build strip-ansi-escapes (ARM)"
        shell: bash
        run: "cargo build --target aarch64-apple-darwin -p strip-ansi-escapes --release"
      - name: "Install cargo-nextest from Cargo"
        uses: baptiste0928/cargo-install@v3
        with:
          crate: "cargo-nextest"
          cache-key: "macos"
      - name: "Test"
        shell: bash
        run: "cargo nextest run --all --no-fail-fast --target=aarch64-apple-darwin"
      - name: "Package"
        shell: bash
        run: "bash ci/deploy.sh"
      - name: "Sign"
        if: env.MACOS_TEAM_ID != ''
        env:
          MACOS_CERT: ${{ secrets.MACOS_CERT }}
          MACOS_CERT_PW: ${{ secrets.MACOS_CERT_PW }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail

          MACOS_PW=$(echo "$MACOS_CERT_PW" | base64 --decode)

          # Set up keychain
          def_keychain=$(eval echo $(security default-keychain -d user))
          security delete-keychain build.keychain || true
          security create-keychain -p "$MACOS_PW" build.keychain
          security default-keychain -d user -s build.keychain
          security unlock-keychain -p "$MACOS_PW" build.keychain

          # Import certificate
          echo "$MACOS_CERT" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 -k build.keychain -P "$MACOS_PW" -T /usr/bin/codesign
          rm /tmp/certificate.p12
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_PW" build.keychain

          # Sign the app inside the zip
          zipfile=$(ls WezTerm-macos-*.zip)
          unzip -q "$zipfile"
          rm "$zipfile"
          appdir=$(ls -d WezTerm-macos-*/)

          /usr/bin/codesign --keychain build.keychain --force --options runtime \
            --entitlements ci/macos-entitlement.plist --deep --sign "$MACOS_TEAM_ID" "${appdir}WezTerm.app/"

          zip -r "$zipfile" "$appdir"

          # Clean up keychain
          security default-keychain -d user -s "$def_keychain"
          security delete-keychain build.keychain || true
      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "macos"
          path: "WezTerm-*.zip"
          retention-days: 14
